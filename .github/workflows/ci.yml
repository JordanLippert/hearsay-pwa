name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - run: bun test packages

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Known limitation (see CONTRIBUTING.md): Hugging Face's Xet CDN blocks model
    # weight downloads from GitHub Actions runners with 403s, so this can't pass
    # reliably here -- it only ever shows red on every PR/push with no actionable
    # signal. Gated to manual trigger; run locally (bun run test:e2e) instead.
    if: github.event_name == 'workflow_dispatch'
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
    steps:
      - uses: actions/checkout@v7
      - run: apt-get update && apt-get install -y unzip
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      # Playwright's bundled Chromium ("headless shell") has no working
      # WebGPU/WASM backend in this environment — @huggingface/transformers
      # fails to load any backend. Real Chrome (channel: "chrome" in
      # playwright.config.ts) is required and isn't preinstalled in the image.
      - run: bunx playwright install --with-deps chrome
      - run: bunx playwright test --config e2e/playwright.config.ts
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7

name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - run: bun test packages

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
    steps:
      - uses: actions/checkout@v4
      - run: apt-get update && apt-get install -y unzip
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      # Playwright's bundled Chromium ("headless shell") has no working
      # WebGPU/WASM backend in this environment — @huggingface/transformers
      # fails to load any backend. Real Chrome (channel: "chrome" in
      # playwright.config.ts) is required and isn't preinstalled in the image.
      - run: bunx playwright install --with-deps chrome
      - run: bunx playwright test --config e2e/playwright.config.ts
